<h1 class="text-2xl font-bold mb-4">הערות פדגוגיות</h1>

@if (children().length > 1) {
  <div class="field" style="max-width: 300px">
    <label for="child-filter">ילד/ה</label>
    <p-select
      inputId="child-filter"
      [options]="children()"
      optionLabel="fullName"
      optionValue="id"
      placeholder="כל הילדים"
      [showClear]="true"
      [ngModel]="selectedChildId()"
      (ngModelChange)="selectedChildId.set($event); onChildChange()"
      styleClass="w-full" />
  </div>
}

@if (loading()) {
  <p class="text-color-secondary mt-3">טוען...</p>
} @else if (notes().length === 0) {
  <p class="text-color-secondary mt-3">אין הערות עדיין.</p>
} @else {
  <div class="flex flex-column gap-3 mt-3">
    @for (note of notes(); track note.id) {
      <p-card>
        <div class="flex justify-content-between align-items-start mb-2 flex-wrap gap-2">
          <span class="font-bold">{{ note.studentName }}</span>
          <span class="text-sm text-color-secondary">{{ note.createdAt | date: 'dd/MM/yyyy HH:mm' }}</span>
        </div>
        <p class="m-0" style="white-space: pre-wrap">{{ note.content }}</p>
      </p-card>
    }
  </div>
}
