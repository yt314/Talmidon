<div class="app-shell">
  <p-toast />

  <p-menubar [model]="menuItems">
    <ng-template pTemplate="start">
      <div class="flex align-items-center gap-2 mr-3">
        <i class="pi pi-graduation-cap" style="font-size: 1.5rem; color: var(--p-primary-color)"></i>
        <span class="font-bold text-lg">תלמידון</span>
      </div>
    </ng-template>
    <ng-template pTemplate="end">
      <div class="flex align-items-center gap-3">
        <span class="text-sm text-color-secondary">שלום, {{ email() }}</span>
        <p-button icon="pi pi-sign-out" label="התנתקות" severity="secondary" [text]="true" (onClick)="logout()" />
      </div>
    </ng-template>
  </p-menubar>

  <main class="app-shell-content">
    <router-outlet />
  </main>
</div>
