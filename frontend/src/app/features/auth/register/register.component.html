<div class="auth-page">
  <p-card styleClass="auth-card">
    <ng-template pTemplate="header">
      <div class="flex align-items-center gap-2 p-4 pb-0">
        <i class="pi pi-graduation-cap" style="font-size: 1.8rem; color: var(--p-primary-color)"></i>
        <h1 class="m-0 text-2xl font-bold">תלמידון</h1>
      </div>
    </ng-template>

    @if (done()) {
      <div class="text-center py-3">
        <i class="pi pi-envelope" style="font-size: 2.5rem; color: var(--p-primary-color)"></i>
        <h2 class="text-xl">כמעט סיימנו!</h2>
        <p class="text-color-secondary">{{ successMessage() }}</p>
        <a routerLink="/login"><p-button label="חזרה להתחברות" icon="pi pi-arrow-left" [text]="true" /></a>
      </div>
    } @else {
      <h2 class="mt-0 mb-3 text-xl">הרשמה כמורה</h2>

      @if (error()) {
        <p-message severity="error" [text]="error()!" styleClass="w-full mb-3" />
      }

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
          <label for="fullName">שם מלא</label>
          <input pInputText id="fullName" formControlName="fullName" class="w-full" />
        </div>
        <div class="field">
          <label for="email">אימייל</label>
          <input pInputText id="email" type="email" formControlName="email" class="w-full" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">סיסמה (8 תווים לפחות)</label>
          <p-password
            inputId="password"
            formControlName="password"
            [toggleMask]="true"
            promptLabel="הקלד סיסמה"
            weakLabel="חלשה"
            mediumLabel="בינונית"
            strongLabel="חזקה"
            styleClass="w-full"
            inputStyleClass="w-full"
            autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="phone">טלפון (לא חובה)</label>
          <input pInputText id="phone" formControlName="phone" class="w-full" />
        </div>

        <p-button type="submit" label="הרשמה" icon="pi pi-user-plus" [loading]="loading()" styleClass="w-full" />
      </form>

      <div class="mt-3 text-center text-sm">
        כבר רשומה? <a routerLink="/login">התחברות</a>
      </div>
    }
  </p-card>
</div>
